<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#07211D; --basin:#037B41; --water:#06D7EB; --water-deep:#067E8E;
    --paper:#F2FAFB; --card:#FFFFFF; --mute:#5C7672; --line:#D4E6E3;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:
      radial-gradient(1100px 520px at 50% -8%, #e7f7f5 0%, rgba(231,247,245,0) 60%),
      var(--paper);
    color:var(--ink);
    font-family:"IBM Plex Sans",system-ui,sans-serif;
    display:flex;align-items:center;justify-content:center;
    -webkit-font-smoothing:antialiased;
  }
  .gate{width:100%;max-width:430px;padding:28px}
  .lock{
    width:46px;height:46px;border-radius:13px;
    background:linear-gradient(150deg,var(--basin),var(--water-deep));
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 6px 22px rgba(3,123,65,.28);margin-bottom:22px;
  }
  .lock svg{width:22px;height:22px;display:block}
  .eyebrow{
    font-family:"IBM Plex Mono",monospace;font-size:11.5px;
    letter-spacing:.22em;text-transform:uppercase;color:var(--water-deep);
  }
  h1{
    font-family:"Archivo",sans-serif;font-weight:800;letter-spacing:-.02em;
    font-size:27px;line-height:1.1;margin:10px 0 8px;
  }
  .sub{color:var(--mute);font-size:15px;line-height:1.55;margin:0 0 24px;max-width:38ch}
  form{margin:0}
  .row{position:relative;display:flex;align-items:center}
  input[type=password],input[type=text]{
    width:100%;font-size:16px;font-family:inherit;color:var(--ink);
    padding:15px 52px 15px 16px;border:1px solid var(--line);border-radius:12px;
    background:var(--card);outline:none;transition:border-color .15s,box-shadow .15s;
  }
  input:focus{border-color:var(--water-deep);box-shadow:0 0 0 4px rgba(6,215,235,.16)}
  .reveal{
    position:absolute;right:8px;border:0;background:transparent;cursor:pointer;
    color:var(--mute);padding:8px;border-radius:8px;display:flex;line-height:0;
  }
  .reveal:hover{color:var(--ink)}
  button.go{
    margin-top:14px;width:100%;font-family:"Archivo",sans-serif;font-weight:700;
    font-size:15.5px;letter-spacing:.01em;color:#fff;border:0;border-radius:12px;
    padding:15px;cursor:pointer;
    background:linear-gradient(135deg,var(--basin),var(--water-deep));
    transition:filter .15s,transform .05s;
  }
  button.go:hover{filter:brightness(1.06)}
  button.go:active{transform:translateY(1px)}
  button.go:disabled{opacity:.6;cursor:default}
  .msg{min-height:20px;margin-top:13px;font-size:13.5px;color:#C0392B;font-family:"IBM Plex Mono",monospace}
  .msg.work{color:var(--mute)}
  .foot{margin-top:26px;font-size:12px;color:var(--mute);font-family:"IBM Plex Mono",monospace;letter-spacing:.02em}
  @media (prefers-reduced-motion:no-preference){
    .gate{animation:in .5s cubic-bezier(.2,.7,.2,1) both}
    @keyframes in{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  }
</style>
</head>

const dec = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));

async function unlock(password){
  const enc = new TextEncoder();
  const baseKey = await crypto.subtle.importKey("raw", enc.encode(password), "PBKDF2", false, ["deriveKey"]);
  const key = await crypto.subtle.deriveKey(
    { name:"PBKDF2", salt:dec(DATA.salt), iterations:DATA.iters, hash:"SHA-256" },
    baseKey, { name:"AES-GCM", length:256 }, false, ["decrypt"]
  );
  const plain = await crypto.subtle.decrypt(
    { name:"AES-GCM", iv:dec(DATA.iv) }, key, dec(DATA.ct)
  );
  return new TextDecoder().decode(plain);
}

const f=document.getElementById('f'), pw=document.getElementById('pw'),
      go=document.getElementById('go'), msg=document.getElementById('msg');

document.getElementById('rev').addEventListener('click',()=>{
  pw.type = pw.type==='password' ? 'text' : 'password'; pw.focus();
});

f.addEventListener('submit', async (e)=>{
  e.preventDefault();
  if(!pw.value) return;
  go.disabled=true; msg.className='msg work'; msg.textContent='Decrypting…';
  try{
    const html = await unlock(pw.value);
    document.open(); document.write(html); document.close();
  }catch(err){
    go.disabled=false; msg.className='msg'; msg.textContent='Incorrect access code.';
    pw.value=''; pw.focus();
  }
});
</script>
